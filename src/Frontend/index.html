<!doctype html>
<html lang="en">
  <head>
    <!-- Character encoding and viewport -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>NeuroMap — Interactive Knowledge Graph Learning Platform</title>
    <meta name="description" content="NeuroMap transforms complex knowledge into interactive visual graphs. Explore topics, discover connections, and master skills through adaptive learning paths." />
    <meta name="keywords" content="learning, knowledge graph, visualization, education, adaptive learning" />
    <meta name="author" content="NeuroMap" />
    <meta name="theme-color" content="#667eea" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="NeuroMap — Interactive Knowledge Graph Learning Platform" />
    <meta property="og:description" content="Transform complex knowledge into interactive visual graphs. Explore topics, discover connections, and master skills through adaptive learning paths." />
    <meta property="og:url" content="https://neuromap.example.com" />
    
    <!-- Accessibility -->
    <meta name="color-scheme" content="light dark" />
    <meta name="supported-color-schemes" content="light dark" />
    
    <!-- Performance Hints -->
    <link rel="preconnect" href="http://localhost:5000" crossorigin />
    <link rel="dns-prefetch" href="http://localhost:5000" />
    <link rel="preload" href="/fonts/system-ui" as="font" type="font/woff2" crossorigin />
    
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="/favicon.ico" />
    
    <!-- Security -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' http://localhost:5000 https://; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;" />
  </head>
  <body>
    <div id="root">
      <!-- Minimal loading state for users with slow connections -->
      <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: system-ui, -apple-system, sans-serif;">
        <div style="text-align: center; color: white;">
          <div style="width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1.5rem;"></div>
          <p style="margin: 0; font-size: 1.125rem;">Loading NeuroMap...</p>
        </div>
        <style>
          @keyframes spin {
            to { transform: rotate(360deg); }
          }
        </style>
      </div>
    </div>
    
    <!-- JavaScript disabled fallback -->
    <noscript>
      <div style="display: flex; align-items: center; justify-content: center; height: 100vh; font-family: system-ui, -apple-system, sans-serif; text-align: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div style="background: white; padding: 2rem; border-radius: 0.5rem; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); max-width: 400px;">
          <h1 style="color: #333; margin-top: 0;">JavaScript Required</h1>
          <p style="color: #666; margin: 1rem 0;">NeuroMap requires JavaScript to be enabled. Please enable JavaScript in your browser settings and reload the page.</p>
          <p style="color: #999; font-size: 0.875rem;">If you continue to experience issues, please contact support.</p>
        </div>
      </div>
    </noscript>
    
    <!-- Application entry point -->
    <script type="module" src="/app/main.tsx"></script>
  </body>
</html>
