version: '3.8'

services:
  backend:
    container_name: neuromap-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: '0'
      SECRET_KEY: "${SECRET_KEY:?Error: SECRET_KEY not set. Please define it in .env file}"
      HOST: "0.0.0.0"
      PORT: "5000"
      ENABLE_COMPRESSION: "1"
      THREAD_POOL_SIZE: "4"
      LOG_LEVEL: "INFO"
    volumes:
      - ./src/Backend:/app
    command: gunicorn -w 4 -b 0.0.0.0:5000 api:app --timeout=60 --access-logfile -
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r = requests.get('http://localhost:5000/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - neuromap-network

  frontend:
    container_name: neuromap-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      VITE_API_URL: http://backend:5000
      VITE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30swget", "--quiet", "--tries=1", "--spider", "http://localhost
      timeout: 10s
      retries: 3
    networks:
      - neuromap-network

networks:
  neuromap-network:
    driver: bridge
