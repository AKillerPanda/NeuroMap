# Nginx Configuration for NeuroMap frontend + backend API proxy

upstream neuromap_backend {
    server backend:5000;
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # Logging
    access_log /var/log/nginx/neuromap_access.log combined;
    error_log /var/log/nginx/neuromap_error.log warn;

    # Rate Limiting
    limit_req zone=api_limit burst=20 nodelay;

    # Health check endpoint (short timeout for quick failure detection)
    location = /health {
        access_log off;
        return 200 "ok\n";
    }

    # API routes
    location /api/ {
        proxy_pass http://neuromap_backend;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        

        proxy_request_buffering off;
    }
    

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
    

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
